name: publish

on:
  push:
    tags: ['*/v*']

jobs:
  publish:
    permissions:
      contents: read
      id-token: write  # required by publish-py (PyPI OIDC trusted publishing)
    uses: hop-top/.github/.github/workflows/publish-on-tag.yml@v0
    secrets:
      NPM_REGISTRY_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PYPI_REGISTRY_TOKEN: ${{ secrets.PYPI_REGISTRY_TOKEN }}
      GH_MIRROR_PAT: ${{ secrets.GH_MIRROR_PAT }}
    with:
      homepage: https://hop.top/cite
      description-prefix: "READ-ONLY MIRROR"
      ecosystems: |
        cite-ts:
          dir: ts
          ecosystem: ts
          package: "@hop-top/cite"
          mirror: hop-top/cite-ts
          # Build delegates to the `ci:build` npm script, which itself
          # runs install+build — keeps test/build-command as single argv
          # tokens to avoid hop-top/.github#9 (publish-ts.yml uses
          # `run: $BUILD_CMD` which strips shell operators).
          test-command: pnpm dlx --allow-build=esbuild vitest@2.1.8 run
          build-command: pnpm ci:build
        cite-py:
          dir: py
          ecosystem: py
          package: hop-top-cite
          mirror: hop-top/cite-py
          # OIDC trusted publishing couldn't match a pending publisher
          # despite repeatedly correct claims; use token auth (added in
          # hop-top/.github#10) until the PyPI side is debugged. Can
          # revert to default oidc afterwards.
          pypi-auth: token
        cite-rs:  { dir: rs,  ecosystem: rs,  package: hop-top-cite,    mirror: hop-top/cite-rs }
        cite-php: { dir: php, ecosystem: php, package: hop-top/cite,    mirror: hop-top/cite-php }
        cite:     { dir: go,  ecosystem: go,                            mirror: hop-top/cite }
